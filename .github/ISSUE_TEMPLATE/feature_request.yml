name: Feature request
description: Suggest a capability or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: >
        Describe the goal rather than the implementation — it often turns out
        there's a simpler way to get there.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: An API sketch or a description of the behavior.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Rig detection / new rig family
        - Procedural animations
        - Expressions / blendshapes
        - Lip-sync
        - Viewer / rendering
        - Dashboard UI
        - Docs
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
